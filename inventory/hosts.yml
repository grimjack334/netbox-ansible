---
all:
  children:
    netbox:
      hosts:
        netbox01:
          ansible_host: 192.168.1.10   # change to your target host
          ansible_user: ansible
    linux_servers:
      hosts: {}  # populate with Linux servers to inventory into NetBox
    windows_servers:
      hosts: {}  # populate with Windows servers to inventory into NetBox
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: ntlm
        ansible_port: 5985
        ansible_winrm_server_cert_validation: ignore
