---
# Called with loop_var _dtl_file — path to a device type YAML file.

- name: Load device type YAML — {{ _dtl_file | basename }}
  ansible.builtin.set_fact:
    _dt: "{{ lookup('ansible.builtin.file', _dtl_file) | from_yaml }}"

- name: "Ensure manufacturer — {{ _dt.manufacturer }}"
  netbox.netbox.netbox_manufacturer:
    netbox_url: "{{ dtl_netbox_url }}"
    netbox_token: "{{ dtl_netbox_token }}"
    validate_certs: "{{ dtl_netbox_validate_certs }}"
    data:
      name: "{{ _dt.manufacturer }}"
    state: present

- name: "Ensure device type — {{ _dt.manufacturer }} {{ _dt.model }}"
  netbox.netbox.netbox_device_type:
    netbox_url: "{{ dtl_netbox_url }}"
    netbox_token: "{{ dtl_netbox_token }}"
    validate_certs: "{{ dtl_netbox_validate_certs }}"
    data:
      manufacturer: "{{ _dt.manufacturer }}"
      model: "{{ _dt.model }}"
      slug: "{{ _dt.slug }}"
      part_number: "{{ _dt.part_number | default(omit) }}"
      u_height: "{{ _dt.u_height | default(1) }}"
      is_full_depth: "{{ _dt.is_full_depth | default(true) }}"
      subdevice_role: "{{ _dt.subdevice_role | default(omit) }}"
      airflow: "{{ _dt.airflow | default(omit) }}"
      comments: "{{ _dt.comments | default(omit) }}"
    state: present

# ── Component templates ────────────────────────────────────────────────────────

- name: "Console port templates — {{ _dt.model }}"
  netbox.netbox.netbox_console_port_template:
    netbox_url: "{{ dtl_netbox_url }}"
    netbox_token: "{{ dtl_netbox_token }}"
    validate_certs: "{{ dtl_netbox_validate_certs }}"
    data:
      device_type: "{{ _dt.slug }}"
      name: "{{ item.name }}"
      type: "{{ item.type | default(omit) }}"
    state: present
  loop: "{{ _dt['console-ports'] | default([]) }}"
  loop_control:
    label: "{{ item.name }}"

- name: "Console server port templates — {{ _dt.model }}"
  netbox.netbox.netbox_console_server_port_template:
